<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">قراءة الفصل | Hiyro Manga</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hm-header">
  <div class="hm-header__inner">
    <a href="index.html" class="hm-logo">Hiyro</a>
    <nav class="hm-nav">
      <a href="index.html">الرئيسية</a>
      <a href="series.html">الأعمال</a>
      <a href="points-store.html">المتجر</a>
      <a href="forum.html">المنتدى</a>
    </nav>
    <div class="hm-header__actions" id="headerActions">
      <a href="login.html" class="btn btn-ghost btn-sm">تسجيل الدخول</a>
    </div>
  </div>
</header>

<main class="container" style="max-width:820px;">
  <div class="reader-bar">
    <a id="workLink" href="#" class="btn btn-ghost btn-sm">🡸 صفحة العمل</a>
    <select id="chapterSelect" onchange="location.href='chapter.html?id='+this.value"></select>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-ghost btn-sm" id="prevBtn">السابق</button>
      <button class="btn btn-ghost btn-sm" id="nextBtn">التالي</button>
    </div>
  </div>

  <div class="ad-slot" id="adTop"></div>

  <div id="readerContent">
    <div class="reader-images" id="readerImages"></div>
  </div>

  <div id="lockedBox" class="reader-locked" style="display:none;">
    <h3 id="lockedTitle"></h3>
    <p id="lockedDesc" style="color:var(--text-muted); margin-bottom:16px;"></p>
    <button class="btn btn-primary" id="lockedBtn"></button>
  </div>

  <div class="ad-slot" id="adBottom"></div>

  <div class="section-head"><h2>التعليقات</h2></div>
  <div class="comment-box" id="commentBox" style="display:none;">
    <textarea id="commentInput" placeholder="اكتب تعليقك..."></textarea>
    <button class="btn btn-primary" onclick="postComment()">نشر</button>
  </div>
  <div id="commentsList"></div>
</main>

<footer class="hm-footer">
  <div class="hm-footer__inner">
    <span>© 2026 Hiyro Manga. جميع الحقوق محفوظة.</span>
    <div class="hm-footer__links"><a href="dmca.html">DMCA</a></div>
  </div>
</footer>

<script src="assets/js/supabase-client.js"></script>
<script>
const chapterId = new URLSearchParams(location.search).get('id');
let currentUser = null;
let currentChapter = null;
let allChapters = [];

async function loadHeader() {
  currentUser = await getCurrentUser();
  if (!currentUser) return;
  document.getElementById('headerActions').innerHTML = `
    <div class="hm-points-pill">⬥ ${currentUser.points} نقطة</div>
    <a href="profile.html?id=${currentUser.id}"><img class="hm-avatar" src="${currentUser.avatar_url || 'assets/img/default-avatar.png'}" alt=""></a>
  `;
  document.getElementById('commentBox').style.display = 'flex';
}

async function loadChapter() {
  const { data: c } = await supabase.from('chapters').select('*, works(id, title)').eq('id', chapterId).single();
  if (!c) return;
  currentChapter = c;
  document.getElementById('pageTitle').textContent = `${c.works.title} - الفصل ${c.chapter_number} | Hiyro Manga`;
  document.getElementById('workLink').href = `work.html?id=${c.works.id}`;

  const { data: chapters } = await supabase.from('chapters').select('id, chapter_number').eq('work_id', c.works.id).order('chapter_number', { ascending: true });
  allChapters = chapters || [];
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = allChapters.map(ch => `<option value="${ch.id}" ${ch.id === chapterId ? 'selected' : ''}>الفصل ${ch.chapter_number}</option>`).join('');
  setupNav();

  await supabase.rpc('log_chapter_view', { p_chapter_id: chapterId, p_user_id: currentUser ? currentUser.id : null });

  if (c.access_type === 'free') return renderImages();
  if (c.access_type === 'direct_link') return renderDirectLink(c);
  if (c.access_type === 'points') return renderPointsLock(c);
}

function setupNav() {
  const idx = allChapters.findIndex(c => c.id === chapterId);
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  if (idx > 0) prevBtn.onclick = () => location.href = `chapter.html?id=${allChapters[idx - 1].id}`;
  else prevBtn.disabled = true;
  if (idx < allChapters.length - 1) nextBtn.onclick = () => location.href = `chapter.html?id=${allChapters[idx + 1].id}`;
  else nextBtn.disabled = true;
}

async function renderImages() {
  const { data: images } = await supabase.from('chapter_images').select('*').eq('chapter_id', chapterId).order('sort_order');
  document.getElementById('readerImages').innerHTML = (images || []).map(img => `<img src="${img.image_url}" loading="lazy" alt="">`).join('');
}

function renderDirectLink(c) {
  document.getElementById('readerContent').style.display = 'none';
  const box = document.getElementById('lockedBox');
  box.style.display = 'block';
  document.getElementById('lockedTitle').textContent = 'هذا الفصل متاح عبر رابط خارجي';
  document.getElementById('lockedDesc').textContent = 'اضغط الزر أدناه للانتقال إلى رابط القراءة.';
  const btn = document.getElementById('lockedBtn');
  btn.textContent = 'الانتقال للقراءة';
  btn.onclick = async () => {
    await supabase.from('click_logs').insert({ chapter_id: chapterId, user_id: currentUser ? currentUser.id : null });
    window.open(c.direct_link_url, '_blank');
  };
}

async function renderPointsLock(c) {
  if (currentUser) {
    const { data: unlocked } = await supabase.from('chapter_unlocks').select('*').eq('user_id', currentUser.id).eq('chapter_id', chapterId).maybeSingle();
    if (unlocked) return renderImages();
  }
  document.getElementById('readerContent').style.display = 'none';
  const box = document.getElementById('lockedBox');
  box.style.display = 'block';
  document.getElementById('lockedTitle').textContent = `هذا الفصل يحتاج ${c.points_price} نقطة`;
  document.getElementById('lockedDesc').textContent = 'افتح الفصل بنقاطك لقراءته الآن.';
  const btn = document.getElementById('lockedBtn');
  btn.textContent = `فتح مقابل ${c.points_price} نقطة`;
  btn.onclick = async () => {
    if (!currentUser) return location.href = 'login.html';
    const { error } = await supabase.rpc('unlock_chapter', { p_user: currentUser.id, p_chapter_id: chapterId });
    if (error) return showToast('نقاطك غير كافية', 'error');
    showToast('تم فتح الفصل', 'success');
    document.getElementById('readerContent').style.display = 'block';
    box.style.display = 'none';
    renderImages();
  };
}

async function loadComments() {
  const { data } = await supabase.from('comments').select('*, profiles(username, avatar_url), stickers(image_url)')
    .eq('target_type', 'chapter').eq('target_id', chapterId).order('created_at', { ascending: false });
  document.getElementById('commentsList').innerHTML = (data || []).map(c => `
    <div class="comment-item">
      <img class="comment-item__avatar" src="${c.profiles?.avatar_url || 'assets/img/default-avatar.png'}" alt="">
      <div>
        <span class="comment-item__name">${c.profiles?.username || 'مستخدم'}</span>
        <span class="comment-item__time">${timeAgo(c.created_at)}</span>
        <div class="comment-item__text">${c.content || ''}</div>
      </div>
    </div>
  `).join('') || '<p style="color:var(--text-muted)">لا توجد تعليقات بعد.</p>';
}

async function postComment() {
  const content = document.getElementById('commentInput').value.trim();
  if (!content) return;
  const { error } = await supabase.from('comments').insert({ user_id: currentUser.id, target_type: 'chapter', target_id: chapterId, content });
  if (error) return showToast('حدث خطأ، حاول مرة أخرى', 'error');
  document.getElementById('commentInput').value = '';
  showToast('تم نشر تعليقك', 'success');
  loadComments();
}

async function loadAds() {
  const { data } = await supabase.from('ad_codes').select('*').eq('is_active', true);
  (data || []).forEach(ad => {
    const slot = document.getElementById(ad.position === 'top' ? 'adTop' : 'adBottom');
    if (slot) slot.innerHTML = ad.code;
  });
}

loadHeader().then(loadChapter);
loadComments();
loadAds();
</script>
</body>
</html>
