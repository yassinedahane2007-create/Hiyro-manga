<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | Hiyro Manga</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hm-header">
  <div class="hm-header__inner">
    <a href="index.html" class="hm-logo">Hiyro</a>
    <div></div>
  </div>
</header>

<main class="container">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>تسجيل الدخول</h1>
      <p class="sub">مرحباً بعودتك إلى Hiyro Manga</p>

      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com">
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••">
        <div class="field-error" id="passwordError"></div>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="login()" id="loginBtn">دخول</button>

      <div class="auth-switch">
        ماعندكش حساب؟ <a href="register.html">سوي حساب جديد</a>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/supabase-client.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showToast('عمر جميع الحقول', 'error');
    return;
  }

  const btn = document.getElementById('loginBtn');
  btn.textContent = 'جارِ الدخول...';
  btn.disabled = true;

  try {
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    showToast('تم تسجيل الدخول بنجاح', 'success');
    setTimeout(() => location.href = 'index.html', 800);
  } catch (err) {
    console.error(err);
    showToast('خطأ: ' + (err.message || 'البريد أو كلمة المرور غير صحيحة'), 'error');
  } finally {
    btn.textContent = 'دخول';
    btn.disabled = false;
  }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
